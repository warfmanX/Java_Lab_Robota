spring.application.name=VulnGuard

# datasource configuration; defaults to in‑memory H2 for quick startup
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:h2:mem:vulnguard;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
# Let Spring Boot infer the JDBC driver from the URL. Do not force H2 driver here.
# spring.datasource.driver-class-name is intentionally omitted.
# to use Postgres set DB_URL, DB_USERNAME, DB_PASSWORD (or activate a profile)

# === ГЛАВНОЕ ИЗМЕНЕНИЕ: Переход на Flyway ===
# Раньше было 'update', теперь 'validate'.
# Hibernate больше не меняет таблицы, он только проверяет, что они совпадают с кодом.
spring.jpa.hibernate.ddl-auto=validate

# Включаем Flyway
spring.flyway.enabled=true
# Эта настройка спасает, если база не пустая (создает базовую метку)
spring.flyway.baseline-on-migrate=true

# enable JDBC batching to speed up bulk inserts such as scraper
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

# Jsoup scraper configuration
vulnguard.scraper.url=https://thehackernews.com/search/label/Vulnerability

# === Настройки Мониторинга ===
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true